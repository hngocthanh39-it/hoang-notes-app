<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes App</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    .app {
      width: 400px;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      height: 80px;
      border-radius: 5px;
      border: none;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .note {
      background: #334155;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
      position: relative;
    }

    .delete {
      position: absolute;
      right: 10px;
      top: 5px;
      cursor: pointer;
      color: red;
    }
  </style>
</head>
<body>

<div class="app">
  <h2>📝 Notes App</h2>

  <textarea id="noteInput" placeholder="Write something..."></textarea>
  <button onclick="addNote()">Add Note</button>

  <div id="notes"></div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

function render() {
  const container = document.getElementById("notes");
  container.innerHTML = "";

  notes.forEach((note, index) => {
    const div = document.createElement("div");
    div.className = "note";

    div.innerHTML = `
      ${note}
      <span class="delete" onclick="deleteNote(${index})">x</span>
    `;

    container.appendChild(div);
  });

  localStorage.setItem("notes", JSON.stringify(notes));
}

function addNote() {
  const input = document.getElementById("noteInput");
  if (input.value.trim() === "") return;

  notes.push(input.value);
  input.value = "";
  render();
}

function deleteNote(index) {
  notes.splice(index, 1);
  render();
}

render();
</script>

</body>
</html>
